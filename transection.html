<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Fraud Detection - Transaction Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f7fc;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

   .container {
  /* ... existing code ... */
  color: #333; /* Change from white to dark gray so text is readable */
}

h2 {
  color: #1e3a8a; /* Keep this nice dark blue */
}

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#1e3a8a;
    }

    .form-group{
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
      color:#333;
    }

    input, select{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      font-size:14px;
    }

    input:focus, select:focus{
      border-color:#2563eb;
      outline:none;
    }

    .btn{
      width:100%;
      padding:12px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    .note{
      margin-top:12px;
      text-align:center;
      font-size:13px;
      color:gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🏦 Submit Transaction</h2>

    <form action="process.php" method="POST">

      <div class="form-group">
        <label>Account Number</label> <input 
          name="account_no" 
          type="text" 
          placeholder="Enter Account Number (e.g. 12345)" 
          required>
      </div>

      <div class="form-group">
        <label>Transaction Amount (₹)</label>
        <input name="amount" type="number" placeholder="Enter Amount" required>
      </div>

      <div class="form-group">
        <label>Payment Method</label>
        <select name="payment_method">
          <option value="">Select Method</option>
          <option>Credit Card</option>
          <option>Debit Card</option>
          <option>UPI</option>
          <option>Net Banking</option>
        </select>
      </div>

      <div class="form-group">
        <label>Current City (Location)</label>
        <input name="location" type="text" placeholder="Enter Location" required>
      </div>

      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" id="dateTime" required>
      </div>

      <button type="submit" class="btn">
        Check for Fraud
      </button>

      <p class="note">
        Smart Fraud Detection System
      </p>

    </form>
  </div>

  <script>
    // Auto-fills the current date and time
    let now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById("dateTime").value = now.toISOString().slice(0,16);
  </script>

</body>
</html>
